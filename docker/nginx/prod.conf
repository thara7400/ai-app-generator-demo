# HTTP -> HTTPS リダイレクト + Let's Encrypt 認証用
server {
    listen 80;
    server_name flutter-generated-app.unolive.tech;

    # Let's Encrypt 認証チャレンジは HTTP で受け付ける
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # それ以外はすべて HTTPS にリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 本体(local.conf とほぼ同じ、証明書パスとサーバ名だけ変更)
server {
    listen 443 ssl;
    server_name flutter-generated-app.unolive.tech;

    # Let's Encrypt 証明書
    ssl_certificate     /etc/letsencrypt/live/flutter-generated-app.unolive.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flutter-generated-app.unolive.tech/privkey.pem;

    client_max_body_size 20M;

    location ~ ^/api/(chat|generate|health|status|webhook)(/.*)?$ {
        proxy_pass http://orchestrator:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    location ~ ^/qr(/.*)?$ {
        proxy_pass http://orchestrator:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://aituber:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Authorization $http_authorization;
    }
}
