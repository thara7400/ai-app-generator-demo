services:

  aituber:
    ports:
      - "3000:3000"

  voicevox:
    ports:
      - "50021:50021"

  orchestrator:
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./docker/nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs/localhost+2.pem:/etc/ssl/certs/cert.pem:ro
      - ./certs/localhost+2-key.pem:/etc/ssl/private/key.pem:ro
    depends_on:
      - aituber
      - orchestrator
    networks:
      - app-net
